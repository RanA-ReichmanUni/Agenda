name: CI/CD Pipeline - .NET to Docker Hub

# מתי הרובוט מתעורר?
on:
  push:
    branches: [ "main" ] # ירוץ רק כשאתה מעדכן את הענף הראשי

jobs:
  build-and-test-and-push:
    runs-on: ubuntu-latest # הרובוט יקבל שרת לינוקס חדש וריק בחינם

    steps:
      # תמיד מתחילים מלהגיד לרובוט: "תוריד את הקוד מה-Repository לשרת שלך"
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # -- חלק 1: CI (בדיקות) --
      
      - name: 🛠️ Setup .NET 10.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: 🧪 Run Unit Tests
        # אנחנו אומרים לו להריץ את הטסטים. אם הם נכשלים, התהליך יעצור כאן באדום!
        run: dotnet test ./AgendaCS.Backend.Tests/

      # -- חלק 2: CD (בנייה ודחיפה לדוקר) --
      
      - name: 🔑 Login to Docker Hub
        # מתחבר לחשבון ה-Docker שלך בעזרת סודות שנגדיר תיכף
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🐳 Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend-cs # מצביע לתיקייה שבה נמצא ה-Dockerfile
          push: true
          # תחליף את המילה your-username בשם המשתמש האמיתי שלך ב-Docker Hub!
          tags: your-username/agenda-backend:latest